<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Detail - PEMS</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="/pages/dashboard.html" class="logo">PEMS</a>
            <nav>
                <a href="/pages/dashboard.html">Dashboard</a>
                <a href="/pages/event-create.html">New Event</a>
                <a href="/pages/approvals.html">Approvals</a>
            </nav>
            <div class="user-menu"></div>
        </div>
    </header>

    <main class="container">
        <div id="alerts"></div>

        <div id="event-container">
            <div class="loading-container">
                <div class="spinner"></div>
            </div>
        </div>
    </main>

    <!-- Status Change Modal -->
    <div id="status-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Change Status</h3>
                <button class="modal-close" onclick="closeModal('status-modal')">&times;</button>
            </div>
            <form id="status-form">
                <div class="form-group">
                    <label class="form-label" for="status-reason">Reason (optional)</label>
                    <textarea id="status-reason" class="form-control" rows="3"></textarea>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn btn-outline" onclick="closeModal('status-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="modal-submit-btn">Confirm</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        let currentEvent = null;
        let pendingAction = null;

        async function loadEvent() {
            const params = new URLSearchParams(window.location.search);
            const eventId = params.get('id');

            if (!eventId) {
                window.location.href = '/pages/dashboard.html';
                return;
            }

            try {
                currentEvent = await api.getEvent(eventId);
                renderEvent();
            } catch (error) {
                showAlert(error.message, 'error');
            }
        }

        function renderEvent() {
            const container = document.getElementById('event-container');
            const event = currentEvent;
            const user = getCurrentUser();
            const isOwner = user && event.created_by === user.id;
            const isApprover = user && ['approver_l1', 'approver_l2', 'admin'].includes(user.role);

            container.innerHTML = `
                <div class="page-header">
                    <div>
                        <h1 class="page-title">${escapeHtml(event.title)}</h1>
                        <div style="margin-top: 10px;">
                            ${getStatusBadge(event.status)}
                            <span style="color: var(--text-secondary); margin-left: 10px;">
                                Created by ${event.creator ? (event.creator.full_name || event.creator.username) : 'Unknown'}
                            </span>
                        </div>
                    </div>
                    <div class="actions">
                        ${renderActions()}
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">Event Details</h2>
                    </div>

                    <div class="form-row" style="margin-bottom: 20px;">
                        <div>
                            <strong>Scheduled Date</strong>
                            <p>${formatDate(event.scheduled_date)}</p>
                        </div>
                        <div>
                            <strong>Time Window</strong>
                            <p>${formatTime(event.start_time)} - ${formatTime(event.end_time)}</p>
                        </div>
                        <div>
                            <strong>Created</strong>
                            <p>${formatDateTime(event.created_at)}</p>
                        </div>
                    </div>

                    ${event.description ? `
                        <div style="margin-bottom: 20px;">
                            <strong>Purpose / Description</strong>
                            <p>${escapeHtml(event.description)}</p>
                        </div>
                    ` : ''}

                    ${event.config_changes ? `
                        <div style="margin-bottom: 20px;">
                            <strong>Configuration Changes</strong>
                            <pre style="background: var(--background-color); padding: 15px; border-radius: 6px; overflow-x: auto;">${escapeHtml(event.config_changes)}</pre>
                        </div>
                    ` : ''}
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">Affected Devices (${event.devices ? event.devices.length : 0})</h2>
                    </div>

                    ${event.devices && event.devices.length > 0 ? `
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Device ID</th>
                                        <th>Name</th>
                                        <th>IP Address</th>
                                        <th>Type</th>
                                        <th>Location</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${event.devices.map(device => `
                                        <tr>
                                            <td>${escapeHtml(device.device_id)}</td>
                                            <td>${escapeHtml(device.device_name || '-')}</td>
                                            <td>${escapeHtml(device.device_ip || '-')}</td>
                                            <td>${escapeHtml(device.device_type || '-')}</td>
                                            <td>${escapeHtml(device.device_location || '-')}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    ` : '<p style="color: var(--text-secondary);">No devices associated with this event.</p>'}
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">Method of Procedure (MOP)</h2>
                    </div>

                    ${event.mop_content ? `
                        <pre style="background: var(--background-color); padding: 15px; border-radius: 6px; overflow-x: auto; white-space: pre-wrap;">${escapeHtml(event.mop_content)}</pre>
                    ` : ''}

                    ${event.mop_file_path ? `
                        <p style="margin-top: 15px;">
                            <a href="/api/v1/events/${event.id}/mop/download" class="btn btn-outline btn-sm">Download MOP Document</a>
                        </p>
                    ` : ''}

                    ${!event.mop_content && !event.mop_file_path ? '<p style="color: var(--text-secondary);">No MOP provided.</p>' : ''}
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">Approval Status</h2>
                    </div>

                    ${event.approvals && event.approvals.length > 0 ? `
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Level</th>
                                        <th>Status</th>
                                        <th>Comments</th>
                                        <th>Date</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${event.approvals.map(approval => `
                                        <tr>
                                            <td>Level ${approval.approval_level}</td>
                                            <td>${getStatusBadge(approval.status)}</td>
                                            <td>${escapeHtml(approval.comments || '-')}</td>
                                            <td>${approval.approved_at ? formatDateTime(approval.approved_at) : '-'}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    ` : '<p style="color: var(--text-secondary);">No approval history yet.</p>'}
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">Event History</h2>
                    </div>
                    <div id="history-container">
                        <div class="loading-container"><div class="spinner"></div></div>
                    </div>
                </div>
            `;

            loadHistory();
        }

        function renderActions() {
            const event = currentEvent;
            const user = getCurrentUser();
            const isOwner = user && event.created_by === user.id;
            const isApprover = user && ['approver_l1', 'approver_l2', 'admin'].includes(user.role);
            const isL1Approver = user && ['approver_l1', 'approver_l2', 'admin'].includes(user.role);
            const isL2Approver = user && ['approver_l2', 'admin'].includes(user.role);

            let actions = [];

            switch (event.status) {
                case 'draft':
                    if (isOwner) {
                        actions.push('<button class="btn btn-primary" onclick="submitForApproval()">Submit for Approval</button>');
                        actions.push(`<a href="/pages/event-edit.html?id=${event.id}" class="btn btn-outline">Edit</a>`);
                        actions.push('<button class="btn btn-danger btn-sm" onclick="deleteEvent()">Delete</button>');
                    }
                    break;

                case 'submitted':
                    if (isL1Approver) {
                        actions.push('<button class="btn btn-success" onclick="approveEvent()">Approve (L1)</button>');
                        actions.push('<button class="btn btn-danger" onclick="rejectEvent()">Reject</button>');
                    }
                    break;

                case 'approved_l1':
                    if (isL2Approver) {
                        actions.push('<button class="btn btn-success" onclick="approveEvent()">Approve (L2)</button>');
                        actions.push('<button class="btn btn-danger" onclick="rejectEvent()">Reject</button>');
                    }
                    break;

                case 'approved_l2':
                    actions.push('<button class="btn btn-primary" onclick="startEvent()">Start Execution</button>');
                    actions.push('<button class="btn btn-warning" onclick="showStatusModal(\'postpone\', \'Postpone Event\')">Postpone</button>');
                    actions.push('<button class="btn btn-outline" onclick="showStatusModal(\'defer\', \'Defer Event\')">Defer</button>');
                    break;

                case 'in_progress':
                    actions.push('<button class="btn btn-success" onclick="showStatusModal(\'complete\', \'Complete Event\')">Mark Completed</button>');
                    actions.push('<button class="btn btn-danger" onclick="showStatusModal(\'revert\', \'Revert Changes\')">Revert</button>');
                    actions.push('<button class="btn btn-warning" onclick="showStatusModal(\'postpone\', \'Postpone Event\')">Postpone</button>');
                    break;

                case 'rejected':
                case 'postponed':
                case 'deferred':
                    if (isOwner) {
                        actions.push('<button class="btn btn-outline" onclick="returnToDraft()">Return to Draft</button>');
                    }
                    break;
            }

            return actions.join('');
        }

        async function loadHistory() {
            try {
                const history = await api.getEventHistory(currentEvent.id);
                const container = document.getElementById('history-container');

                if (history.length === 0) {
                    container.innerHTML = '<p style="color: var(--text-secondary);">No history yet.</p>';
                    return;
                }

                container.innerHTML = `
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>From</th>
                                    <th>To</th>
                                    <th>Reason</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${history.map(h => `
                                    <tr>
                                        <td>${h.previous_status ? getStatusBadge(h.previous_status) : '-'}</td>
                                        <td>${getStatusBadge(h.new_status)}</td>
                                        <td>${escapeHtml(h.change_reason || '-')}</td>
                                        <td>${formatDateTime(h.changed_at)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            } catch (error) {
                console.error('Failed to load history:', error);
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Actions
        async function submitForApproval() {
            if (!confirm('Submit this event for approval?')) return;

            try {
                await api.submitEvent(currentEvent.id);
                showAlert('Event submitted for approval');
                loadEvent();
            } catch (error) {
                showAlert(error.message, 'error');
            }
        }

        async function deleteEvent() {
            if (!confirm('Are you sure you want to delete this event?')) return;

            try {
                await api.deleteEvent(currentEvent.id);
                showAlert('Event deleted');
                window.location.href = '/pages/dashboard.html';
            } catch (error) {
                showAlert(error.message, 'error');
            }
        }

        async function approveEvent() {
            const comments = prompt('Enter approval comments (optional):');

            try {
                await api.approveEvent(currentEvent.id, comments);
                showAlert('Event approved');
                loadEvent();
            } catch (error) {
                showAlert(error.message, 'error');
            }
        }

        async function rejectEvent() {
            const comments = prompt('Enter rejection reason:');
            if (comments === null) return;

            try {
                await api.rejectEvent(currentEvent.id, comments);
                showAlert('Event rejected');
                loadEvent();
            } catch (error) {
                showAlert(error.message, 'error');
            }
        }

        async function startEvent() {
            if (!confirm('Start event execution?')) return;

            try {
                await api.startEvent(currentEvent.id);
                showAlert('Event execution started');
                loadEvent();
            } catch (error) {
                showAlert(error.message, 'error');
            }
        }

        function showStatusModal(action, title) {
            pendingAction = action;
            document.getElementById('modal-title').textContent = title;
            document.getElementById('status-reason').value = '';
            openModal('status-modal');
        }

        document.getElementById('status-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const reason = document.getElementById('status-reason').value;

            try {
                switch (pendingAction) {
                    case 'complete':
                        await api.completeEvent(currentEvent.id, reason);
                        break;
                    case 'revert':
                        await api.revertEvent(currentEvent.id, reason);
                        break;
                    case 'postpone':
                        await api.postponeEvent(currentEvent.id, reason);
                        break;
                    case 'defer':
                        await api.deferEvent(currentEvent.id, reason);
                        break;
                }

                closeModal('status-modal');
                showAlert('Status updated');
                loadEvent();
            } catch (error) {
                showAlert(error.message, 'error');
            }
        });

        async function returnToDraft() {
            // This would require a status transition back to draft
            // For now, show a message
            showAlert('Please contact an administrator to return this event to draft status', 'warning');
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!requireAuth()) return;
            loadEvent();
        });
    </script>
</body>
</html>
