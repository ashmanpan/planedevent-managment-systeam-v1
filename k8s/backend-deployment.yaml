apiVersion: v1
kind: Namespace
metadata:
  name: pems

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-uploads-pvc
  namespace: pems
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: v1
kind: Service
metadata:
  name: pems-backend-service
  namespace: pems
spec:
  type: ClusterIP
  selector:
    app: pems-backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pems-backend
  namespace: pems
  labels:
    app: pems-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pems-backend
  template:
    metadata:
      labels:
        app: pems-backend
    spec:
      imagePullSecrets:
      - name: ecr-registry-secret
      containers:
      - name: backend
        image: 252864143672.dkr.ecr.ap-southeast-1.amazonaws.com/apj/can-aaipe:pems_backend_v02
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: pems-secrets
              key: DATABASE_URL
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: pems-secrets
              key: SECRET_KEY
        - name: EXTERNAL_DEVICE_API_URL
          valueFrom:
            secretKeyRef:
              name: pems-secrets
              key: EXTERNAL_DEVICE_API_URL
        - name: EXTERNAL_DEVICE_API_KEY
          valueFrom:
            secretKeyRef:
              name: pems-secrets
              key: EXTERNAL_DEVICE_API_KEY
        volumeMounts:
        - name: uploads-storage
          mountPath: /app/uploads
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: uploads-storage
        persistentVolumeClaim:
          claimName: backend-uploads-pvc
