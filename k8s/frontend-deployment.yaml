apiVersion: v1
kind: Namespace
metadata:
  name: pems

---
apiVersion: v1
kind: Service
metadata:
  name: pems-frontend-service
  namespace: pems
spec:
  type: NodePort
  selector:
    app: pems-frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pems-frontend
  namespace: pems
  labels:
    app: pems-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pems-frontend
  template:
    metadata:
      labels:
        app: pems-frontend
    spec:
      imagePullSecrets:
      - name: ecr-registry-secret
      containers:
      - name: frontend
        image: 252864143672.dkr.ecr.ap-southeast-1.amazonaws.com/apj/can-aaipe:pems_frontend_v01
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
